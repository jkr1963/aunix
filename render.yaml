services:
  - type: web
    name: aunix-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aunix-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_API_URL
        sync: false      # Set after first deploy: https://<api-name>.onrender.com/api
      - key: CORS_ORIGINS
        sync: false      # Set to your static site URL: https://<site-name>.onrender.com

  - type: web
    name: aunix-web
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .

databases:
  - name: aunix-db
    plan: free
    databaseName: aunix
    user: aunix
