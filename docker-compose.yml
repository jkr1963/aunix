version: '3.9'

services:

  # ── PostgreSQL database ──────────────────────────────────────
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: aunix
      POSTGRES_PASSWORD: aunixpass
      POSTGRES_DB: aunix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aunix"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://aunix:aunixpass@db:5432/aunix
      JWT_SECRET: local-dev-secret-change-in-prod
      AGENT_TOKEN_SALT: local-dev-salt
      CORS_ORIGINS: http://localhost:5500
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── Ubuntu target machine (for testing the agent) ────────────
  ubuntu-target:
    image: ubuntu:22.04
    container_name: aunix-test-target
    command: sleep infinity
    volumes:
      - ./agent_template:/aunix-agent

volumes:
  postgres_data:
